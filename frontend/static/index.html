<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReSplat</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>ReSplat</h1>
          <span id="serviceState">ready</span>
        </div>

        <form id="jobForm" class="panel">
          <label>
            <span>视频</span>
            <input id="files" name="files" type="file" accept=".mp4,.mov,.m4v,video/*" multiple required />
          </label>

          <label>
            <span>模型</span>
            <select id="model" name="model_id" required></select>
          </label>

          <div class="control-grid">
            <label>
              <span>抽帧 FPS</span>
              <input id="sampleFps" name="sample_fps" type="number" min="0.1" max="60" step="0.1" value="4" required />
            </label>
            <label>
              <span>渲染批量</span>
              <input id="chunkSize" name="render_chunk_size" type="number" min="1" max="32" step="1" value="2" required />
            </label>
          </div>

          <div class="control-grid">
            <label>
              <span>开始秒</span>
              <input id="startTime" name="start_time" type="number" min="0" step="0.1" placeholder="0" />
            </label>
            <label>
              <span>结束秒</span>
              <input id="endTime" name="end_time" type="number" min="0" step="0.1" placeholder="自动" />
            </label>
          </div>

          <button id="submitButton" type="submit">启动 pipeline</button>
        </form>

        <section class="jobs-section">
          <div class="section-head">
            <h2>任务</h2>
            <button id="refreshJobs" class="icon-button" type="button" title="刷新">↻</button>
          </div>
          <div id="jobs" class="jobs"></div>
        </section>
      </aside>

      <section class="workspace">
        <div class="toolbar">
          <div>
            <p id="activeTitle">等待任务</p>
            <span id="activeMeta">上传视频后会在这里显示产物</span>
          </div>
          <div class="actions">
            <a id="downloadVideo" class="button ghost disabled" href="#" download>下载 video.mp4</a>
            <a id="downloadPly" class="button ghost disabled" href="#" download>下载 gaussians.ply</a>
          </div>
        </div>

        <div class="viewer-wrap">
          <div id="viewer"></div>
          <div id="viewerEmpty" class="empty-state">3DGS viewer</div>
        </div>

        <div class="output-pane">
          <video id="videoPreview" controls playsinline></video>
          <pre id="logs"></pre>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
